<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../../imagenes/logo.png">
    <title>DrawSports PRO チーム版 | マルチライセンス</title>
    <meta name="description" content="DrawSports PRO チームとクラブ向け。マルチユーザーライセンス、iPadプロ戦術ビデオ分析。管理パネルとオンライン購入。">
    <link rel="canonical" href="https://drawsports.app/pro/ja/">
    <meta name="robots" content="index, follow">
    <style>
        :root {
            --primary: #FF1744;
            --neon-red: #FF1744;
            --bg-dark: #1a0f0f;
            --bg-card: #2a1f1f;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.7;
            overflow-x: hidden;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 50px;
            background: var(--bg-card);
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .back-link:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 6px 15px rgba(255, 23, 68, 0.4);
        }
        .back-link img { width: 24px; height: 24px; border-radius: 22%; }
        
        .top-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .lang-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .lang-btn:hover, .lang-btn.active {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .lang-btn.active { background: rgba(255, 23, 68, 0.2); }
        
        .lang-desktop { display: flex; gap: 10px; }
        .lang-mobile { display: none; position: relative; gap: 8px; align-items: center; }
        .lang-trigger {
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--bg-card); border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-main); font-size: 1.2rem; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .lang-trigger:hover { transform: translateY(-2px); border-color: var(--primary); }
        .lang-trigger.lang-current { border-color: var(--primary); background: rgba(255, 23, 68, 0.2); }
        .lang-dropdown {
            display: none; position: absolute; top: 100%; right: 0; margin-top: 8px;
            background: var(--bg-card); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 1001;
        }
        .lang-dropdown.open { display: flex; flex-direction: column; gap: 4px; }
        .lang-dropdown a {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 8px;
            text-decoration: none; color: var(--text-main);
            font-size: 1.5rem; transition: background 0.2s;
        }
        .lang-dropdown a:hover { background: rgba(255, 23, 68, 0.2); }
        @media (max-width: 768px) {
            .lang-desktop { display: none !important; }
            .lang-mobile { display: flex !important; }
        }
        
        .login-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 50px;
            background: var(--primary);
            color: white !important;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 23, 68, 0.5);
        }
        
        .hero {
            text-align: center;
            padding: 120px 20px 80px;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 22%;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            background: var(--bg-card);
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }
        .hero-badge {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 2px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.5); }
            50% { opacity: 0.95; box-shadow: 0 0 20px 5px rgba(255, 23, 68, 0.3); }
        }
        .hero h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }
        .hero .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 550px;
            margin: 0 auto 30px;
            line-height: 1.8;
        }
        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            align-items: center;
            margin: 0 auto 28px;
            max-width: 560px;
        }
        .fomo-text {
            background: var(--bg-card);
            border: 2px solid rgba(255, 23, 68, 0.3);
            border-radius: 16px;
            padding: 25px 35px;
            max-width: 500px;
            margin: 25px auto 0;
            font-size: 1.05rem;
            color: var(--text-main);
            line-height: 1.8;
        }
        .fomo-text strong { color: var(--primary); }
        .notify-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
        }
        .notify-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 23, 68, 0.5);
        }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.95rem;
        }
        footer a { color: var(--primary); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .hero .subtitle { font-size: 1.05rem; }
            .back-link, .top-nav { top: 12px; }
            .back-link { left: 12px; padding: 8px 14px; font-size: 0.85rem; }
            .top-nav { right: 12px; gap: 8px; }
            .login-btn { padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">
        <img src="../../imagenes/logo.png" alt="">
        DrawSports
    </a>
    
    <div class="top-nav">
        <div class="lang-desktop">
            <a href="../../pro/" class="lang-btn" title="Español">🇪🇸</a>
            <a href="../../pro/en/" class="lang-btn" title="English">🇺🇸</a>
            <a href="../../pro/zh/" class="lang-btn" title="中文">🇨🇳</a>
            <a href="index.html" class="lang-btn active" title="日本語">🇯🇵</a>
        </div>
        <div class="lang-mobile">
            <button type="button" class="lang-trigger lang-current" aria-label="現在の言語">🇯🇵</button>
            <button type="button" class="lang-trigger lang-globe" aria-label="言語を変更" aria-expanded="false">🌐</button>
            <div class="lang-dropdown" id="langDropdown">
                <a href="../../pro/" title="Español">🇪🇸</a>
                <a href="../../pro/en/" title="English">🇺🇸</a>
                <a href="../../pro/zh/" title="中文">🇨🇳</a>
                <a href="index.html" title="日本語">🇯🇵</a>
            </div>
        </div>
        <a href="https://panel.drawsports.app/ja" class="login-btn">ログイン</a>
    </div>
    <script>
    (function(){
        var d=document,m=d.querySelector('.lang-mobile'),tr=d.querySelectorAll('.lang-trigger'),dd=d.getElementById('langDropdown');
        if(!m||!dd)return;
        function toggle(){dd.classList.toggle('open');tr[1].setAttribute('aria-expanded',dd.classList.contains('open'));}
        function close(){dd.classList.remove('open');tr[1].setAttribute('aria-expanded','false');}
        tr[0].addEventListener('click',toggle);tr[1].addEventListener('click',toggle);
        d.addEventListener('click',function(e){if(!m.contains(e.target))close();});
    })();
    </script>

    <section class="hero">
        <div class="logo-container">
            <img src="../../imagenes/logo.png" alt="DrawSports PRO">
        </div>
        <span class="hero-badge">提供開始</span>
        <h1>DrawSports PRO</h1>
        <p class="subtitle">チームとクラブ向けライセンス。iPadプロ戦術ビデオ分析。各コーチ独立アカウント、一元管理。</p>
        <div class="hero-actions">
            <a href="planes/" class="notify-cta">プランと料金を見る</a>
        </div>
        <div class="fomo-text">
            年間プラン <strong>89.99&nbsp;€</strong>〜。オンライン購入または<a href="planes/" style="color:var(--primary);">プランを選ぶ</a>。
        </div>
    </section>

    <footer>
        <p>© 2026 DrawSports. Basketouch Solutions Spain SL.</p>
        <p>
            <a href="../">drawsports.appに戻る</a> ·
            <a href="planes/">プラン・料金</a> ·
            <a href="mailto:info@basketouch.com">お問い合わせ</a>
        </p>
    </footer>
</body>
</html>
